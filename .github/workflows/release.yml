name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to build and publish
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.display_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            arch: x86_64
            display_name: Intel
            file_label: Intel-x86_64
          - runner: macos-15
            arch: arm64
            display_name: Apple silicon
            file_label: Apple-Silicon-arm64
    runs-on: ${{ matrix.runner }}
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Verify release version
        run: |
          version=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' packaging/DeskflowManager-Info.plist)
          test "$RELEASE_TAG" = "v$version"
          test "$(uname -m)" = "${{ matrix.arch }}"
          echo "VERSION=$version" >> "$GITHUB_ENV"

      - name: Test
        run: make check

      - name: Configure code signing
        shell: bash
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        run: |
          if [[ -z "$MACOS_CERTIFICATE_P12" \
            && -z "$MACOS_CERTIFICATE_PASSWORD" \
            && -z "$MACOS_CODESIGN_IDENTITY" ]]; then
            echo "CODESIGN_IDENTITY=-" >> "$GITHUB_ENV"
            echo "No signing secrets configured; using an ad-hoc signature."
            exit 0
          fi

          test -n "$MACOS_CERTIFICATE_P12"
          test -n "$MACOS_CERTIFICATE_PASSWORD"
          test -n "$MACOS_CODESIGN_IDENTITY"

          keychain="$RUNNER_TEMP/deskflow-signing.keychain-db"
          certificate="$RUNNER_TEMP/deskflow-signing.p12"
          keychain_password=$(openssl rand -hex 32)

          printf '%s' "$MACOS_CERTIFICATE_P12" | base64 -D > "$certificate"
          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security import "$certificate" -k "$keychain" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$keychain_password" "$keychain" >/dev/null
          security list-keychains -d user -s "$keychain"
          security find-identity -v -p codesigning "$keychain" \
            | grep -F "$MACOS_CODESIGN_IDENTITY" >/dev/null

          rm -f "$certificate"
          echo "CODESIGN_IDENTITY=$MACOS_CODESIGN_IDENTITY" >> "$GITHUB_ENV"
          echo "SIGNING_KEYCHAIN=$keychain" >> "$GITHUB_ENV"

      - name: Build architecture-specific app
        env:
          ARCHS: ${{ matrix.arch }}
        run: ./scripts/build-manager-app.sh

      - name: Create drag-and-drop DMG
        run: |
          mkdir -p dist
          dmg="dist/Deskflow-ASM-$VERSION-macOS-${{ matrix.file_label }}.dmg"
          ./scripts/create-dmg.sh --arch "${{ matrix.arch }}" --output "$dmg"
          ./scripts/verify-dmg.sh "$dmg" "${{ matrix.arch }}"
          filename=$(basename "$dmg")
          (cd dist && shasum -a 256 "$filename" > "$filename.sha256")

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

      - name: Remove temporary signing keychain
        if: always() && env.SIGNING_KEYCHAIN != ''
        run: security delete-keychain "$SIGNING_KEYCHAIN"

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - name: Download DMGs
        uses: actions/download-artifact@v4
        with:
          pattern: dmg-*
          path: dist
          merge-multiple: true

      - name: Verify release assets
        run: |
          test "$(find dist -maxdepth 1 -name '*.dmg' -type f | wc -l)" -eq 2
          test "$(find dist -maxdepth 1 -name '*.sha256' -type f | wc -l)" -eq 2
          (cd dist && sha256sum -c ./*.sha256)

      - name: Publish release
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$RELEASE_TAG" dist/* \
              --verify-tag \
              --generate-notes \
              --title "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY"
          fi
